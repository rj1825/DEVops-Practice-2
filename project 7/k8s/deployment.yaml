apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitops-flask-app
  namespace: default
  labels:
    app: gitops-flask-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gitops-flask-app
  template:
    metadata:
      labels:
        app: gitops-flask-app
    spec:
      containers:
      - name: flask-app
        # This tag is updated dynamically by the Jenkins CI pipeline
        image: rohitkumar1825/flask-app:8817bbe
        ports:
        - containerPort: 5000
        imagePullPolicy: IfNotPresent
        resources:
          limits:
            memory: "256Mi"
            cpu: "500m"
          requests:
            memory: "128Mi"
            cpu: "250m"
