services:
  jenkins:
    build:
      context: .
      dockerfile: Dockerfile.jenkins
    image: custom-jenkins-docker:latest
    container_name: jenkins-ci-server
    user: root # Required to allow access to /var/run/docker.sock
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - ./jenkins_home:/var/jenkins_home
      # Sharing the host docker daemon socket so Jenkins can build containers
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 8.8.4.4
